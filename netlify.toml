[build]
  base    = "client"
  command = "npm install && npm run build"
  publish = "dist"

# Proxy all API calls to the Render backend
[[redirects]]
  from   = "/api/*"
  to     = "https://hazeon-hindi-translator.onrender.com/api/:splat"
  status = 200
  force  = true

# Proxy Socket.IO (real-time progress) to Render backend
[[redirects]]
  from   = "/socket.io/*"
  to     = "https://hazeon-hindi-translator.onrender.com/socket.io/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes served by React
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
