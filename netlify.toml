[build]
  command = "npm install && cd client && npm install --include=dev && npm run build"
  publish = "client/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["server/**"]

[functions."api"]
  external_node_modules = ["express", "express-rate-limit", "multer", "mammoth", "pdfkit", "jszip", "@google/generative-ai", "@supabase/supabase-js", "uuid", "nodemailer"]

[functions."translate-background"]
  external_node_modules = ["mammoth", "pdfkit", "jszip", "@google/generative-ai", "@supabase/supabase-js", "uuid"]

# Route API calls to the serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/api/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes served by React
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
