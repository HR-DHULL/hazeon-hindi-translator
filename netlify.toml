[build]
  command = "npm install && cd client && npm install && npm run build"
  publish = "client/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["server/**"]

# Route API calls to the serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/api/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes served by React
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
